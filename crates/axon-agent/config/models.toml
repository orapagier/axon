# ── 'axon' model (local axon-api-proxy @ localhost:5000) removed 2026-06-27:
#    proxy decommissioned; Gemini/OpenRouter/etc. now handle all routing.

# ── ROUTING DESIGN (2026-07-03 latency rework) ──────────────────────────────
#
# Priority = strict speed tiers. The router round-robins between provider
# buckets WITHIN a tier (load balancing, not ordering), so mixing fast and
# slow providers in one tier makes the slow one answer a fair share of calls.
# Each tier must therefore hold only providers of similar speed:
#
#   P1  cerebras + groq   (~1s)     fastest inference available
#   P2  gemini flash      (~2-25s)  proven reliable tool calling, 9 keys
#   P3  nvidia NIM        (~10-40s) slow reasoning endpoints, spiky
#   P4  openrouter :free  (variable) harsh daily caps, use before ollama
#   P5  ollama cloud      (up to ~2min cold) absolute last resort
#
# timeout_secs is per attempt (per model_id!). A record with two model_ids can
# burn 2x its timeout before failing over, so slow tiers get 45s, fast get 15s.

# ── P1 FAST TIER (moved from router/axon_node roles 2026-07-03) ─────────────

