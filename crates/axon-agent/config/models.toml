# ── LOCAL FINE-TUNE (experimental, fully inert until explicitly requested) ──
#
# Fine-tuned Qwen2.5-1.5B-Instruct (finetune/ pipeline), running locally via
# Ollama (localhost, NOT ollama.com cloud). role is non-empty so this is
# invisible to the default general pool / any P1-P5 routing (see
# router/model_router.rs pool_indices vs general_pool) -- opt-in only, until
# eval results (finetune/scripts/06_eval_tool_calls.py) justify promoting it
# via an explicit new call site.

[[models]]
name       = "local-qwen25-1.5b-finetune"
provider   = "ollama"
model_id   = "axon-qwen2.5-1.5b-local"
api_key    = "${AXON_MASTER_KEY}"
base_url   = "http://localhost:11434"
role       = ""
priority   = 9
timeout_secs = 30
enabled    = true

# ── AGENT LOOP ROUTING (crates/axon-agent/src/agent/loop.rs) ────────────────
#
# The main agent loop always routes through the general pool (role = ""),
# then the cross-role sweep, then the paid_model fallback below — there is no
# longer a role split by task complexity. Put your best general-purpose
# model(s) at role = "". "agent.reasoning_effort" (a setting, not a role) is
# applied automatically on any tool-using/correction turn regardless of role.
#
# Provider-agnostic: any provider works in any role.
#   provider = "anthropic"  → native Anthropic API
#   provider = "ollama"     → Ollama API (set base_url)
#   provider = anything else ("google", "openrouter", "nvidia", "groq",
#              "cerebras", ...) → OpenAI-compatible API (set base_url unless
#              the provider has a built-in default)
#
# api_key "${VAR}" resolves from the settings DB first, then the environment.
# The name inside ${...} must match EXACTLY — a mismatch surfaces at runtime
# as "All models exhausted".
#
# thinking_mode (optional, anthropic provider):
#   "adaptive" — Claude 4.6+ adaptive thinking
#   "budget"   — older Claude models that take a thinking token budget
#   "off"      — default; safe for models that reject the parameter
#
# role = "image_model": vision-capable models for the Cortex workflow node's
# Image mode. STRICT — unlike the general pool, this role never falls back
# to general/paid_model; if no image_model is available/healthy, the run
# fails clearly instead of silently answering via a text-only model.
# Supported providers today: anthropic, and any OpenAI-compatible provider.
# Ollama vision models are not yet supported (images are silently dropped).

