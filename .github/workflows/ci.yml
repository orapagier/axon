name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      # Informational for now: prints lints but only fails on hard errors.
      # Tighten to `-- -D warnings` once the existing lint backlog is cleared.
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Tests
        run: cargo test --workspace

  deny:
    # Blocking: the dependency-upgrade pass (russh, rmcp, quick-xml, anyhow, ...)
    # cleared the advisory backlog. Remaining findings with no available fix
    # (rsa Marvin attack, a few unmaintained transitive crates) are tracked as
    # explicit exceptions in deny.toml rather than silently ignored here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axon-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: axon-ui/package-lock.json
      - run: npm ci
      - run: npm test
      # Informational for now: eslint-plugin-vue's recommended set surfaced a
      # real pre-existing backlog (81 vue/no-mutating-props in NodeDetails.vue
      # — direct mutation of the `node` prop). Tighten once that's cleared;
      # `|| true` keeps this from failing the job in the meantime.
      - run: npm run lint || true
      - run: npm run build
