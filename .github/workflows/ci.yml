name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      # Informational for now: prints lints but only fails on hard errors.
      # Tighten to `-- -D warnings` once the existing lint backlog is cleared.
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Tests
        run: cargo test --workspace

  deny:
    # Informational for now: the first enforcement run surfaced a real advisory
    # backlog (russh CryptoVec, rustls/webpki CVEs, unmaintained rustls-pemfile
    # and paste, RSA Marvin attack, rmcp DNS rebinding). Flip to blocking after
    # a dedicated dependency-upgrade pass clears it.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axon-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: axon-ui/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
