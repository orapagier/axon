<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axon API Proxy</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --surface3: #2d333b;
      --border: #30363d;
      --border2: #444c56;
      --text: #cdd9e5;
      --text-dim: #768390;
      --text-muted: #545d68;
      --accent: #4184e4;
      --accent-glow: #4184e420;
      --green: #46954a;
      --green-text: #57ab5a;
      --red: #e5534b;
      --red-dim: #e5534b18;
      --orange: #c69026;
      --purple: #986ee2;
      --radius: 6px;
      --radius-lg: 10px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      min-width: 180px;
    }

    .view-tabs {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .view-tab {
      padding: 6px 16px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      border-right: 1px solid var(--border);
      transition: 0.15s;
    }

    .view-tab:last-child {
      border-right: none;
    }

    .view-tab:hover {
      background: var(--surface3);
      color: var(--text);
    }

    .view-tab.active {
      background: var(--accent);
      color: white;
      font-weight: 500;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 180px;
      justify-content: flex-end;
    }

    .live-pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px 4px 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green-text);
      animation: blink 2.5s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      60% {
        opacity: .4
      }
    }

    .endpoint-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      overflow: hidden;
    }

    .endpoint-chip code {
      padding: 5px 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .endpoint-chip button {
      padding: 5px 12px;
      background: var(--surface3);
      border: none;
      border-left: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 11px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .view-content {
      display: none;
    }

    .view-content.active {
      display: block;
    }

    .sec-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .sec-title {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1px 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .btn {
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: .15s;
    }

    .btn:hover {
      background: var(--surface3);
      border-color: var(--border2);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 500;
    }

    .btn-danger {
      color: var(--red);
    }

    .btn-ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text-dim);
    }

    .btn-sm {
      padding: 4px 10px;
      font-size: 12px;
    }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:hover td {
      background: var(--surface2);
    }

    .tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--mono);
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .cell-mono {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--text-dim);
    }

    .key-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .tog {
      position: relative;
      width: 34px;
      height: 18px;
      cursor: pointer;
    }

    .tog input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .tog-track {
      position: absolute;
      inset: 0;
      background: var(--surface3);
      border-radius: 10px;
      transition: .2s;
    }

    .tog input:checked+.tog-track {
      background: var(--green);
    }

    .tog-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: .2s;
    }

    .tog input:checked~.tog-thumb {
      left: 18px;
    }

    /* -- Chat UI -- */
    .chat-wrap {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 160px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .chat-msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .chat-msg.user {
      align-self: flex-end;
    }

    .chat-msg.assistant {
      align-self: flex-start;
    }

    .chat-bubble {
      padding: 12px 16px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }

    .chat-msg.user .chat-bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .chat-msg.assistant .chat-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .chat-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .chat-meta span {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--mono);
    }

    .chat-input-area {
      padding: 16px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }

    .chat-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 12px;
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      min-height: 48px;
      max-height: 200px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      border-color: var(--accent);
    }

    /* -- Modals -- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .overlay.open {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .modal-head {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-foot {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input,
    .field select,
    .field textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 13.5px;
      width: 100%;
    }

    .field input:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin: 0;
    }

    .key-wrap {
      position: relative;
      width: 100%;
    }

    .key-wrap input {
      padding-right: 40px;
    }

    .key-eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      font-size: 14px;
    }

    /* -- Auth -- */
    .auth-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .auth-screen.open {
      display: flex;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 16px;
      width: 380px;
      text-align: center;
    }

    .auth-card h2 {
      margin-bottom: 24px;
      font-size: 20px;
    }

    .auth-card input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: white;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 20px;
      text-align: center;
      font-size: 16px;
    }

    .auth-card button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      font-weight: 600;
    }

    .toast-bay {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 20px;
      font-size: 13px;
      animation: slideIn 0.3s;
    }

    @keyframes slideIn {
      from {
        transform: translateX(20px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="logo"><span>🦀</span> Axon API Proxy</div>
    <div class="view-tabs">
      <div id="tab-config" class="view-tab active" onclick="switchView('config')">Config</div>
      <div id="tab-chat" class="view-tab" onclick="switchView('chat')">Chat</div>
    </div>
    <div class="header-right">
      <div class="live-pill"><span class="live-dot"></span> <span id="slot-count">0</span> slots</div>
      <div class="endpoint-chip">
        <code>/v1/chat/completions</code>
        <button onclick="copyUrl()">Copy</button>
      </div>
    </div>
  </header>

  <main>
    <div id="view-config" class="view-content active">
      <section>
        <div class="sec-head">
          <div class="sec-title">Providers <span class="badge" id="prov-count">0</span></div>
          <button class="btn btn-primary btn-sm" onclick="openProvModal()">+ Add Provider</button>
        </div>
        <div id="prov-grid"
          style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px;"></div>
      </section>

      <section style="margin-top:40px;">
        <div class="sec-head">
          <div class="sec-title">Models <span class="badge" id="model-count">0</span></div>
          <button class="btn btn-primary btn-sm" onclick="openModelModal()">+ Add Model</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Provider</th>
                <th>Priority</th>
                <th>Model ID</th>
                <th>Timeout</th>
                <th>API Key</th>
                <th>Tokens</th>
                <th>Active</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="models-tbody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <div id="view-chat" class="view-content">
      <div class="chat-wrap">
        <div id="chat-history" class="chat-history"></div>
        <div class="chat-input-area">
          <textarea id="chat-input" class="chat-input"
            placeholder="Message models... (Enter to send, Shift+Enter for newline)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
          <button id="chat-send" class="btn btn-primary" style="height:48px;" onclick="sendChat()">Send</button>
        </div>
      </div>
    </div>
  </main>

  <div id="overlay" class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title">Edit</h3><button class="btn btn-ghost" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitModal()">Save Changes</button>
      </div>
    </div>
  </div>

  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <h2>Axon Proxy Auth</h2>
      <input id="auth-key" type="password" placeholder="Enter API Key">
      <button onclick="doAuth()">Connect</button>
    </div>
  </div>

  <div id="toast-bay" class="toast-bay"></div>

  <script>
    const G = { providers: [], models: [], mode: '', editIdx: null, chatMsgs: [] };
    const BASE = window.location.origin;

    function authHeaders() {
      const k = sessionStorage.getItem('axon_key');
      return k ? { 'Authorization': `Bearer ${k}` } : {};
    }

    async function load() {
      try {
        const r = await fetch(BASE + '/api/config', { headers: authHeaders() });
        if (r.status === 401) { document.getElementById('auth-screen').classList.add('open'); return; }
        const d = await r.json();
        G.providers = d.providers || [];
        G.models = d.models || [];
        render();
      } catch (e) { toast('Load failed: ' + e.message, 'err'); }
    }

    function doAuth() {
      const k = document.getElementById('auth-key').value.trim();
      if (!k) return;
      sessionStorage.setItem('axon_key', k);
      document.getElementById('auth-screen').classList.remove('open');
      load();
    }

    function render() {
      const pGrid = document.getElementById('prov-grid');
      document.getElementById('prov-count').textContent = G.providers.length;
      pGrid.innerHTML = G.providers.map((p, i) => `
            <div style="background:var(--surface); border:1px solid var(--border); padding:16px; border-radius:10px; display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <div style="font-weight:600; font-size:14px; display:flex; gap:8px; align-items:center;">
                        <span style="width:8px; height:8px; border-radius:50%; background:var(--accent);"></span>
                        ${p.name}
                    </div>
                    <div style="font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:4px;">${p.base_url}</div>
                </div>
                <div style="display:flex; gap:4px;">
                    <button class="btn btn-ghost btn-sm" onclick="openProvModal(${i})">✎</button>
                    <button class="btn btn-ghost btn-sm" onclick="delProv('${p.name}')">✕</button>
                </div>
            </div>
        `).join('') || '<div style="grid-column:1/-1; padding:20px; color:var(--text-dim); text-align:center;">No providers.</div>';

      const mTbody = document.getElementById('models-tbody');
      document.getElementById('model-count').textContent = G.models.length;
      const activeCount = G.models.filter(m => m.enabled).length;
      document.getElementById('slot-count').textContent = activeCount;

      mTbody.innerHTML = G.models.map((m, i) => `
            <tr>
                <td class="cell-mono">${m.enabled ? G.models.filter(x => x.enabled).indexOf(m) : '—'}</td>
                <td style="font-weight:600;">${m.name}</td>
                <td><span class="tag">${m.provider}</span></td>
                <td><span class="badge" style="background:var(--surface3);">P${m.priority}</span></td>
                <td class="cell-mono">${m.model_id}</td>
                <td class="cell-mono">${m.timeout_secs || '30'}s</td>
                <td><span class="key-chip">${m.api_key_display}</span></td>
                <td class="cell-mono">${Number(m.max_tokens).toLocaleString()}</td>
                <td><label class="tog"><input type="checkbox" ${m.enabled ? 'checked' : ''} onchange="toggleModel('${m.name}')"><div class="tog-track"></div><div class="tog-thumb"></div></label></td>
                <td>
                  <div style="display:flex; gap:4px;">
                    <button class="btn btn-ghost btn-sm" onclick="openModelModal(${i})">Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="delModel(${i})">✕</button>
                  </div>
                </td>
            </tr>
        `).join('') || '<tr><td colspan="10" style="text-align:center; padding:40px; color:var(--text-dim);">No models configured.</td></tr>';
    }

    function switchView(v) {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view-content').forEach(c => c.classList.remove('active'));
      document.getElementById('tab-' + v).classList.add('active');
      document.getElementById('view-' + v).classList.add('active');
    }

    function openModelModal(idx = null) {
      G.editIdx = idx; G.mode = idx !== null ? 'edit-model' : 'add-model';
      const m = idx !== null ? G.models[idx] : { name: '', provider: '', model_id: '', max_tokens: 4096, priority: 1, timeout_secs: null, base_url: '', auth_style: '' };
      document.getElementById('modal-title').textContent = idx !== null ? 'Edit Model' : 'Add Model';
      document.getElementById('modal-body').innerHTML = `
            <div class="field"><label>Name</label><input id="f-name" value="${m.name}" ${idx !== null ? 'readonly' : ''}></div>
            <div class="field-row">
                <div class="field"><label>Provider</label><input id="f-prov" value="${m.provider}"></div>
                <div class="field"><label>Max Tokens</label><input id="f-max" type="number" value="${m.max_tokens}"></div>
            </div>
            <div class="field-row">
                <div class="field"><label>Priority</label><input id="f-prio" type="number" value="${m.priority}"></div>
                <div class="field"><label>Timeout (s)</label><input id="f-to" type="number" value="${m.timeout_secs || ''}" placeholder="Inherit"></div>
            </div>
            <div class="field"><label>Model ID</label><input id="f-mid" value="${m.model_id}"></div>
            <div class="field"><label>Base URL Override</label><input id="f-url" value="${m.base_url || ''}" placeholder="Optional"></div>
            <div class="field"><label>API Key</label>
                <div class="key-wrap">
                    <input id="f-key" type="password" placeholder="${idx !== null ? 'Leave blank to keep' : 'Paste API key'}">
                    <button class="key-eye" type="button" onclick="const i=document.getElementById('f-key'); i.type=i.type==='password'?'text':'password';">👁</button>
                </div>
                ${idx !== null ? `<p class="hint">Stored as ${m.env_var}</p>` : ''}
            </div>
        `;
      document.getElementById('overlay').classList.add('open');
    }

    function openProvModal(idx = null) {
      G.editIdx = idx; G.mode = idx !== null ? 'edit-prov' : 'add-prov';
      const p = idx !== null ? G.providers[idx] : { name: '', base_url: '', auth_style: 'bearer', timeout_secs: null };
      document.getElementById('modal-title').textContent = idx !== null ? 'Edit Provider' : 'Add Provider';
      document.getElementById('modal-body').innerHTML = `
            <div class="field"><label>Provider Name</label><input id="f-pname" value="${p.name}" ${idx !== null ? 'readonly' : ''}></div>
            <div class="field"><label>Base URL</label><input id="f-purl" value="${p.base_url}"></div>
            <div class="field"><label>Auth Style</label><select id="f-pauth"><option value="bearer" ${p.auth_style === 'bearer' ? 'selected' : ''}>Bearer Token</option><option value="x-api-key" ${p.auth_style === 'x-api-key' ? 'selected' : ''}>x-api-key Header</option></select></div>
            <div class="field"><label>Default Timeout (s)</label><input id="f-pto" type="number" value="${p.timeout_secs || ''}" placeholder="30"></div>
        `;
      document.getElementById('overlay').classList.add('open');
    }

    function closeModal() { document.getElementById('overlay').classList.remove('open'); }

    async function submitModal() {
      try {
        let url = '', method = 'POST', body = {};
        if (G.mode.includes('model')) {
          const name = document.getElementById('f-name').value;
          url = G.mode === 'edit-model' ? '/api/models/' + name : '/api/models';
          method = G.mode === 'edit-model' ? 'PUT' : 'POST';
          body = {
            name, provider: document.getElementById('f-prov').value, model_id: document.getElementById('f-mid').value,
            api_key: document.getElementById('f-key').value, max_tokens: parseInt(document.getElementById('f-max').value),
            priority: parseInt(document.getElementById('f-prio').value), timeout_secs: parseInt(document.getElementById('f-to').value) || null,
            base_url: document.getElementById('f-url').value || null, enabled: true
          };
        } else {
          url = '/api/providers';
          body = {
            name: document.getElementById('f-pname').value, base_url: document.getElementById('f-purl').value,
            auth_style: document.getElementById('f-pauth').value, timeout_secs: parseInt(document.getElementById('f-pto').value) || null
          };
        }
        const r = await fetch(BASE + url, { method, headers: { ...authHeaders(), 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!r.ok) throw new Error((await r.json()).error || 'Save failed');
        toast('Saved successfully', 'ok'); closeModal(); load();
      } catch (e) { toast(e.message, 'err'); }
    }

    async function delModel(idx) {
      const name = G.models[idx].name;
      if (!confirm(`Delete model "${name}"?`)) return;
      try { await fetch(BASE + `/api/models/${name}`, { method: 'DELETE', headers: authHeaders() }); load(); } catch (e) { toast(e.message, 'err'); }
    }

    async function toggleModel(name) {
      try { await fetch(BASE + `/api/models/${name}/toggle`, { method: 'POST', headers: authHeaders() }); load(); } catch (e) { toast(e.message, 'err'); }
    }

    async function delProv(name) {
      if (!confirm('Delete provider?')) return;
      try { await fetch(BASE + `/api/providers/${name}`, { method: 'DELETE', headers: authHeaders() }); load(); } catch (e) { toast(e.message, 'err'); }
    }

    // -- Chat Logic --
    async function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      G.chatMsgs.push({ role: 'user', content: text });
      renderMsg('user', text);

      const btn = document.getElementById('chat-send');
      btn.disabled = true;

      const hist = document.getElementById('chat-history');
      const mWrap = document.createElement('div');
      mWrap.className = 'chat-msg assistant';
      mWrap.innerHTML = `<div class="chat-bubble">...</div><div class="chat-meta"><span class="m-slot"></span> <span class="m-time"></span> <span class="m-tokens"></span></div>`;
      hist.appendChild(mWrap);
      hist.scrollTop = hist.scrollHeight;

      const bubble = mWrap.querySelector('.chat-bubble');
      let full = '', start = Date.now();

      try {
        const r = await fetch(BASE + '/v1/chat/completions', {
          method: 'POST', headers: { ...authHeaders(), 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: 'auto', messages: G.chatMsgs, stream: true, stream_options: { include_usage: true } })
        });
        if (!r.ok) throw new Error(await r.text());

        const slot = r.headers.get('x-axon-proxy-slot');
        if (slot) mWrap.querySelector('.m-slot').textContent = '🤖 ' + slot;

        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          for (const line of chunk.split('\n')) {
            if (line.startsWith('data: ') && line !== 'data: [DONE]') {
              try {
                const j = JSON.parse(line.slice(6));
                if (j.choices?.[0]?.delta?.content) {
                  full += j.choices[0].delta.content;
                  bubble.textContent = full;
                }
                if (j.usage) mWrap.querySelector('.m-tokens').textContent = '🪙 ' + (j.usage.total_tokens || 0);
              } catch (e) { }
            }
          }
          hist.scrollTop = hist.scrollHeight;
        }
        G.chatMsgs.push({ role: 'assistant', content: full });
      } catch (e) {
        bubble.style.background = 'var(--red-dim)';
        bubble.style.border = '1px solid var(--red)';
        bubble.textContent = 'Error: ' + e.message;
      } finally {
        btn.disabled = false;
        mWrap.querySelector('.m-time').textContent = '⏱️ ' + (Date.now() - start) + 'ms';
        hist.scrollTop = hist.scrollHeight;
      }
    }

    function renderMsg(role, content) {
      const hist = document.getElementById('chat-history');
      const d = document.createElement('div');
      d.className = 'chat-msg ' + role;
      d.innerHTML = `<div class="chat-bubble">${content}</div>`;
      hist.appendChild(d);
      hist.scrollTop = hist.scrollHeight;
    }

    function toast(m, t) {
      const b = document.getElementById('toast-bay');
      const e = document.createElement('div');
      e.className = 'toast';
      e.style.borderLeft = t === 'err' ? '4px solid var(--red)' : '4px solid var(--green)';
      e.textContent = m;
      b.appendChild(e);
      setTimeout(() => e.remove(), 3000);
    }

    function copyUrl() {
      navigator.clipboard.writeText(BASE + '/v1/chat/completions');
      toast('URL copied', 'ok');
    }

    load();
  </script>
</body>

</html>
