org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# AGP 8.7.x rejects JDK 25+ as the daemon JVM (its bytecode check throws and
# collapses the error to a bare version string). The system `java` is JDK 25,
# so pin Gradle to Android Studio's bundled JDK 21 here. Override on machines
# without Android Studio via ORG_GRADLE_org_gradle_java_home.
org.gradle.java.home=C:/Program Files/Android/Android Studio/jbr
